<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Day Cage Opens For Anup Ghimire</title>

  <!-- PWA Meta -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anup Escaping" />
  <meta name="theme-color" content="#c8b89a" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e;
      --text-primary: #e8e6e0; --text-secondary: #5a5750; --text-muted: #2e2c28;
      --accent: #c8b89a; --accent-dim: #6b5f4e; --bar-track: #161614;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1.5rem; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* Install Banner */
    #install-banner {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      z-index: 100; width: calc(100% - 3rem); max-width: 480px;
      background: #181714; border: 1px solid var(--accent-dim);
      padding: 1rem 1.25rem; align-items: center; gap: 1rem;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    #install-banner { display: none; }
    #install-banner.visible { display: flex; }
    #ios-hint { display: none; }
    #ios-hint.visible { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(1.5rem); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .install-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .install-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .install-text { flex: 1; min-width: 0; }
    .install-text strong { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 500; color: var(--text-primary); letter-spacing: 0.05em; margin-bottom: 0.2rem; }
    .install-text span { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.68rem; color: var(--text-secondary); }
    .install-btn { background: var(--accent); color: #0a0a0a; border: none; padding: 0.45rem 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s; }
    .install-btn:hover { opacity: 0.85; }
    .dismiss-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0.2rem; flex-shrink: 0; transition: color 0.15s; }
    .dismiss-btn:hover { color: var(--text-secondary); }

    /* iOS hint */
    #ios-hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      z-index: 100; width: calc(100% - 3rem); max-width: 480px;
      background: #181714; border: 1px solid var(--accent-dim);
      padding: 1rem 1.25rem;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .ios-row { display: flex; align-items: flex-start; gap: 0.75rem; }
    .ios-row strong { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 500; color: var(--text-primary); letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .ios-row p { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.68rem; color: var(--text-secondary); line-height: 1.5; }
    .ios-row p svg { display: inline; width: 13px; height: 13px; vertical-align: middle; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; margin: 0 2px; }
    .ios-text { flex: 1; }

    /* Main */
    .container { position: relative; z-index: 1; width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 0; padding-bottom: 5rem; }
    .title { font-family: 'IBM Plex Mono', monospace; font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 0.5rem; }
    .label { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 2rem; text-align: center; }
    .percentage-wrap { text-align: center; line-height: 1; margin-bottom: 2.5rem; }
    .percentage { font-family: 'IBM Plex Mono', monospace; font-weight: 300; font-size: clamp(2.8rem, 9vw, 5.5rem); color: var(--text-primary); letter-spacing: -0.02em; display: inline-block; transition: color 0.4s ease; }
    .percentage.complete { color: var(--accent); }
    .pct-symbol { font-size: clamp(1.5rem, 4vw, 3rem); color: var(--accent-dim); vertical-align: super; margin-left: 0.15em; }
    .bar-wrap { width: 100%; margin-bottom: 3rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .bar-track { width: 100%; height: 2px; background: var(--bar-track); overflow: hidden; position: relative; }
    .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; position: relative; }
    .bar-fill::after { content: ''; position: absolute; right: 0; top: 0; height: 100%; width: 40px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.35)); }
    .bar-ends { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.06em; }
    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 1px; }
    .meta-item { background: var(--surface); padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .meta-key { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); opacity: 0.7; }
    .meta-val { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: var(--text-primary); font-weight: 400; letter-spacing: 0.02em; }
    .meta-val.remaining { color: var(--accent); }
    .meta-val.done { color: var(--text-secondary); }
    .footer { margin-top: 2.5rem; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; letter-spacing: 0.12em; color: var(--text-muted); }
    @media (max-width: 480px) { .meta { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <!-- Android/Desktop install banner -->
  <div id="install-banner">
    <div class="install-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5M3 19h18"/></svg>
    </div>
    <div class="install-text">
      <strong>Add to Home Screen</strong>
      <span>Install for quick access, like an app</span>
    </div>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="dismiss-btn" id="install-dismiss">✕</button>
  </div>

  <!-- iOS Safari hint -->
  <div id="ios-hint">
    <div class="ios-row">
      <div class="ios-text">
        <strong>Add to Home Screen</strong>
        <p>Tap <svg viewBox="0 0 24 24"><path d="M8 9l4-4 4 4M12 5v12"/><path d="M3 16v3a1 1 0 001 1h16a1 1 0 001-1v-3"/></svg> then <em>"Add to Home Screen"</em> to install this as an app.</p>
      </div>
      <button class="dismiss-btn" id="ios-dismiss">✕</button>
    </div>
  </div>

  <div class="container">
    <div class="title">THE DAY CAGE OPENS FOR ANUP GHIMIRE</div>
    <div class="label">elapsed interval</div>

    <div class="percentage-wrap">
      <span class="percentage" id="pct">0.000000000</span><span class="pct-symbol">%</span>
    </div>

    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
      <div class="bar-ends"><span>0%</span><span>100%</span></div>
    </div>

    <div class="meta">
      <div class="meta-item">
        <span class="meta-key">start</span>
        <span class="meta-val" id="start-time">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">end</span>
        <span class="meta-val" id="end-time">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">time spent</span>
        <span class="meta-val" id="spent">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">remaining</span>
        <span class="meta-val remaining" id="remaining">—</span>
      </div>
    </div>

    <div class="footer">updates 10× per second · timestamps in local time</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Android / Desktop install prompt
    let deferredPrompt = null;
    const banner       = document.getElementById('install-banner');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.add('visible');
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.remove('visible');
    });
    document.getElementById('install-dismiss').addEventListener('click', () => banner.classList.remove('visible'));
    window.addEventListener('appinstalled', () => banner.classList.remove('visible'));

    // iOS Safari hint
    const isIos        = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true;
    const iosHint      = document.getElementById('ios-hint');
    if (isIos && !isStandalone) iosHint.classList.add('visible');
    document.getElementById('ios-dismiss').addEventListener('click', () => iosHint.classList.remove('visible'));

    // Timer
    const END_MONTH = 4, END_DAY = 10, END_HOUR = 10, END_MIN = 0;
    const pad = n => String(n).padStart(2, '0');
    const fmt = ts => { const d = new Date(ts); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'  '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); };
    const dur = ms => { if (ms<=0) return '0d  00h  00m  00s'; const s=Math.floor(ms/1000); return `${Math.floor(s/86400)}d  ${pad(Math.floor(s%86400/3600))}h  ${pad(Math.floor(s%3600/60))}m  ${pad(s%60)}s`; };

    const startTs = new Date(2012, 3, 15, 10, 0, 0, 0).getTime();
    const getEnd  = () => { const n=new Date(); let c=new Date(n.getFullYear(),END_MONTH,END_DAY,END_HOUR,END_MIN,0,0); if(c.getTime()<=Date.now()) c=new Date(n.getFullYear()+1,END_MONTH,END_DAY,END_HOUR,END_MIN,0,0); return c.getTime(); };
    const endTs   = getEnd();

    document.getElementById('start-time').textContent = fmt(startTs);
    document.getElementById('end-time').textContent   = fmt(endTs);

    const pctEl = document.getElementById('pct');
    const barEl = document.getElementById('bar');
    const remEl = document.getElementById('remaining');
    const sptEl = document.getElementById('spent');
    let lastW   = -1;

    function tick() {
      const now     = Date.now();
      const clamped = Math.min(100, Math.max(0, (now - startTs) / (endTs - startTs) * 100));
      const display = clamped.toFixed(9);
      pctEl.textContent = display;
      sptEl.textContent = dur(now - startTs);
      if (clamped >= 100) {
        pctEl.classList.add('complete');
        remEl.textContent = 'interval complete';
        remEl.className = 'meta-val done';
      } else {
        pctEl.classList.remove('complete');
        remEl.textContent = dur(endTs - now);
        remEl.className = 'meta-val remaining';
      }
      const w = parseFloat(display);
      if (Math.abs(w - lastW) >= 0.0001) { barEl.style.width = clamped.toFixed(4)+'%'; lastW = w; }
    }
    tick();
    setInterval(tick, 100);
  </script>
</body>
</html>
